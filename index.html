    input = (input || '').trim();
    if (!input || input === 'home') { brPushHistory('home'); brRenderHome(); return; }
    if (/^https?:\/\//.test(input)) { brPushHistory(input); brRenderExternal(input); return; }
    if (/^[a-zA-Z0-9а-яА-Я\-]+\.[a-zA-Zа-яА-Я]{2,}/.test(input) && !input.includes(' ')) {
      const url = 'https://' + input; brPushHistory(url); brRenderExternal(url); return;
    }
    brPushHistory('search:'+input); brSearch(input);
  };
  window.brBack = function() { if(brIdx<=0)return; brIdx--; brNavFromHistory(); };
  window.brFwd = function() { if(brIdx>=brHistory.length-1)return; brIdx++; brNavFromHistory(); };
  window.brRefresh = function() { brNavFromHistory(); };
}

function brPushHistory(url) { brHistory=brHistory.slice(0,brIdx+1); brHistory.push(url); brIdx=brHistory.length-1; brCurrentUrl=url; }
function brNavFromHistory() { const url=brHistory[brIdx]; brCurrentUrl=url; if(url==='home')brRenderHome(); else if(url.startsWith('search:'))brSearch(url.slice(7)); else brRenderExternal(url); }
function brSetAddr(text,icon){ const el=document.getElementById('br-addr'),lk=document.getElementById('br-lock'); if(el)el.value=text; if(lk)lk.textContent=icon||'🌐'; }
function brSetStatus(t){ const el=document.getElementById('br-status'); if(el)el.textContent=t; }
function brProgress(pct){ const el=document.getElementById('br-prog'); if(!el)return; el.style.width=pct+'%'; if(pct>=100)setTimeout(()=>el.style.width='0%',500); }
function brGetPage(){ return document.getElementById('br-page'); }

function brRenderHome() {
  brSetAddr('','🏠'); brSetStatus('Домашняя страница — WebBrowser'); brProgress(100);
  const bookmarks = JSON.parse(localStorage.getItem('makuos_bookmarks')||'null')||BROWSER_BOOKMARKS_DEFAULT;
  const page = brGetPage(); if(!page)return;
  const recentUrls = brHistory.filter(h=>h!=='home'&&!h.startsWith('search:')).slice(-4).reverse();
  page.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding:50px 30px;min-height:100%;background:linear-gradient(180deg,#0e1117 0%,#131929 100%)">
      <div style="font-size:48px;margin-bottom:8px">🌐</div>
      <h1 style="font-size:28px;font-weight:300;color:#f0f6fc;letter-spacing:3px;margin-bottom:4px">WebBrowser</h1>
      <p style="font-size:13px;color:#484f58;margin-bottom:36px">Встроенный браузер WebOS 0.5</p>
      <div style="display:flex;width:100%;max-width:560px;margin-bottom:44px;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.4);border:1px solid #30363d">
        <input id="br-home-q" style="flex:1;padding:14px 18px;font-size:15px;background:#161b22;color:#f0f6fc;border:none;outline:none;font-family:'Outfit',sans-serif" placeholder="🔍  Поиск в интернете..." onkeydown="if(event.key==='Enter')brNav(this.value)">
        <button onclick="brNav(document.getElementById('br-home-q').value)" style="padding:14px 22px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:15px;font-family:'Outfit',sans-serif;font-weight:500">Найти</button>
      </div>
      <div style="width:100%;max-width:620px">
        <div style="font-size:12px;color:#484f58;margin-bottom:12px;letter-spacing:1px;text-transform:uppercase">Быстрый доступ</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
          ${bookmarks.slice(0,8).map(b=>`<div onclick="brNav('${b.url}')" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 10px;border-radius:12px;background:#161b22;border:1px solid #21262d;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='#1c2128';this.style.borderColor='var(--accent)';this.style.transform='translateY(-2px)'" onmouseout="this.style.background='#161b22';this.style.borderColor='#21262d';this.style.transform=''" oncontextmenu="event.preventDefault();showCtxMenu(event,[{label:'🌐 Открыть',fn:()=>brNav('${b.url}')},{label:'↗️ В новой вкладке браузера',fn:()=>window.open('${b.url}','_blank')},{label:'🗑️ Удалить закладку',fn:()=>brRemoveBookmark('${b.url}')}])"><span style="font-size:24px">${b.icon}</span><span style="font-size:12px;color:#c9d1d9;text-align:center">${b.name}</span><span style="font-size:10px;color:#484f58">${b.desc||''}</span></div>`).join('')}
        </div>
      </div>
      ${recentUrls.length?`<div style="width:100%;max-width:620px;margin-top:28px"><div style="font-size:12px;color:#484f58;margin-bottom:12px;letter-spacing:1px;text-transform:uppercase">Недавнее</div><div style="display:flex;flex-direction:column;gap:4px">${recentUrls.map(h=>`<div onclick="brNav('${h}')" style="padding:8px 14px;border-radius:8px;background:#161b22;border:1px solid #21262d;cursor:pointer;font-size:13px;color:#8b949e;transition:background 0.1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onmouseover="this.style.background='#1c2128'" onmouseout="this.style.background='#161b22'">🕐 ${h}</div>`).join('')}</div></div>`:''}
    </div>`;
  setTimeout(()=>{const q=document.getElementById('br-home-q');if(q)q.focus();},100);
}

function brSearch(query) {
  brSetAddr('🔍 '+query,'🔍'); brSetStatus('Поиск: '+query+'...'); brProgress(30);
  const page=brGetPage(); if(!page)return;
  page.innerHTML=`<div style="padding:24px 32px;max-width:780px"><div style="font-size:13px;color:#484f58;margin-bottom:20px">Поиск: «${query}»</div>${Array(5).fill(0).map(()=>`<div style="margin-bottom:24px"><div style="height:16px;background:#21262d;border-radius:4px;width:70%;margin-bottom:8px;animation:bpulse 1.5s infinite"></div><div style="height:11px;background:#161b22;border-radius:4px;width:90%;margin-bottom:4px;animation:bpulse 1.5s infinite"></div><div style="height:11px;background:#161b22;border-radius:4px;width:75%;animation:bpulse 1.5s infinite"></div></div>`).join('')}<style>@keyframes bpulse{0%,100%{opacity:1}50%{opacity:0.35}}</style></div>`;
  brProgress(60);
  fetch('https://api.duckduckgo.com/?q='+encodeURIComponent(query)+'&format=json&no_html=1&skip_disambig=1&no_redirect=1')
    .then(r=>r.json()).then(data=>{brProgress(100);brSetStatus('Результаты для «'+query+'»');brRenderSearchResults(query,data);})
    .catch(()=>{brProgress(100);brSetStatus('Офлайн режим');brRenderOfflineSearch(query);});
}

function brRenderSearchResults(query, data) {
  const page=brGetPage(); if(!page)return;
  const abstract=data.AbstractText||'', abstractUrl=data.AbstractURL||'', abstractSource=data.AbstractSource||'', image=data.Image||'';
  const relTopics=(data.RelatedTopics||[]).filter(t=>t.FirstURL&&t.Text).slice(0,8);
  const results=(data.Results||[]).slice(0,4);
  let html=`<div style="padding:24px 32px;max-width:800px;font-family:'Outfit',sans-serif">
    <div style="display:flex;gap:8px;margin-bottom:24px">
      <input value="${query.replace(/"/g,'&quot;')}" style="flex:1;padding:10px 16px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#f0f6fc;font-size:14px;outline:none;font-family:inherit" onkeydown="if(event.key==='Enter')brNav(this.value)" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='#30363d'">
      <button onclick="brNav(document.querySelector('#br-page input').value)" style="padding:10px 18px;background:var(--accent);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:inherit">🔍</button>
    </div>
    <div style="font-size:12px;color:#484f58;margin-bottom:20px">Результаты DuckDuckGo для «${query}»</div>`;
  if(abstract){html+=`<div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:24px;display:flex;gap:16px">${image?`<img src="${image}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0" onerror="this.style.display='none'">`:''}<div><div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${abstractSource}</div><div style="font-size:14px;color:#f0f6fc;line-height:1.6;margin-bottom:10px">${abstract.slice(0,400)}${abstract.length>400?'…':''}</div>${abstractUrl?`<span onclick="brNav('${abstractUrl}')" style="font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline">${abstractUrl}</span>`:''}</div></div>`;}
  results.forEach(r=>{html+=`<div onclick="brNav('${r.FirstURL}')" style="margin-bottom:16px;cursor:pointer;padding:14px 16px;border-radius:10px;border:1px solid transparent;transition:all 0.15s" onmouseover="this.style.background='#161b22';this.style.borderColor='#30363d'" onmouseout="this.style.background='';this.style.borderColor='transparent'"><div style="font-size:15px;color:#58a6ff;margin-bottom:3px;font-weight:500">${(r.Text||'').slice(0,80)}</div><div style="font-size:12px;color:#3fb950">${r.FirstURL}</div></div>`;});
  if(relTopics.length){html+=`<div style="font-size:12px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px">Похожие темы</div>`;relTopics.forEach(t=>{html+=`<div onclick="brNav('${t.FirstURL}')" style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:8px;cursor:pointer;margin-bottom:6px;transition:background 0.1s" onmouseover="this.style.background='#161b22'" onmouseout="this.style.background=''"><span style="font-size:16px">🔗</span><div><div style="font-size:13px;color:#c9d1d9;line-height:1.5">${(t.Text||'').slice(0,150)}</div><div style="font-size:11px;color:var(--accent);margin-top:3px">${t.FirstURL}</div></div></div>`;});}
  if(!abstract&&!results.length&&!relTopics.length)html+=brOfflineLinks(query);
  html+=`<div style="margin-top:32px;padding-top:16px;border-top:1px solid #21262d;font-size:11px;color:#484f58;text-align:center">WebBrowser · DuckDuckGo Instant Answer API</div></div>`;
  page.innerHTML=html;
}

function brRenderOfflineSearch(query) {
  const page=brGetPage(); if(!page)return;
  page.innerHTML=`<div style="padding:24px 32px;max-width:780px"><div style="background:#161b22;border:1px solid #f85149;border-radius:10px;padding:16px 20px;margin-bottom:20px;color:#f85149;font-size:13px">⚠️ Не удалось подключиться к поисковику. Проверьте соединение.</div>${brOfflineLinks(query)}</div>`;
}

function brOfflineLinks(query) {
  const enc=encodeURIComponent(query);
  return `<div style="margin-top:8px"><div style="font-size:12px;color:#484f58;margin-bottom:10px">Открыть поиск напрямую (новая вкладка)</div><div style="display:flex;flex-direction:column;gap:6px">
    ${[['🔍','Яндекс',`https://yandex.ru/search/?text=${enc}`],['🌍','Google',`https://google.com/search?q=${enc}`],['📖','Вики',`https://ru.wikipedia.org/wiki/${enc}`],['🐙','GitHub',`https://github.com/search?q=${enc}`]].map(([ic,nm,url])=>`<div onclick="brRenderExternal('${url}')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:#161b22;border:1px solid #21262d;cursor:pointer;transition:background 0.1s" onmouseover="this.style.background='#1c2128'" onmouseout="this.style.background='#161b22'"><span>${ic}</span><span style="color:#58a6ff;font-size:13px">${nm}</span><span style="font-size:11px;color:#484f58;margin-left:auto">${url.slice(0,55)}</span></div>`).join('')}
  </div></div>`;
}

function brRenderExternal(url) {
  brSetAddr(url,url.startsWith('https')?'🔒':'⚠️'); brSetStatus('Открытие: '+url); brProgress(50);
  const page=brGetPage(); if(!page)return;
  let domain=url; try{domain=new URL(url).hostname;}catch(e){}
  const fav=`https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  page.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 30px;background:linear-gradient(180deg,#0e1117,#131929);text-align:center">
    <img src="${fav}" style="width:64px;height:64px;border-radius:16px;margin-bottom:20px;background:#161b22;padding:4px" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2248%22 font-size=%2248%22>🌐</text></svg>'">
    <h2 style="font-size:22px;font-weight:600;color:#f0f6fc;margin-bottom:8px">${domain}</h2>
    <p style="font-size:13px;color:#8b949e;margin-bottom:6px;word-break:break-all;max-width:500px">${url}</p>
    <div style="background:#1a1f2e;border:1px solid #f0883e;border-radius:12px;padding:20px 28px;max-width:500px;margin:24px 0;text-align:left">
      <div style="font-size:14px;font-weight:600;color:#f0883e;margin-bottom:10px">⚠️ Почему сайт не открывается?</div>
      <div style="font-size:13px;color:#8b949e;line-height:1.7">Все современные сайты запрещают встраивание через заголовки <code style="color:#79c0ff;background:#161b22;padding:1px 5px;border-radius:3px">Content-Security-Policy</code> и <code style="color:#79c0ff;background:#161b22;padding:1px 5px;border-radius:3px">X-Frame-Options</code>. Это защита от кликджекинга — обойти на клиенте невозможно.</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:28px">
      <a href="${url}" target="_blank" style="padding:10px 22px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500">↗️ Открыть в новой вкладке браузера</a>
      <button onclick="brAddBookmarkUrl('${url}','${domain}')" style="padding:10px 22px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif">🔖 Закрепить сайт</button>
      <button onclick="brNav('home')" style="padding:10px 22px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif">← Домой</button>
    </div>
    <div style="max-width:560px;width:100%">
      <div style="font-size:11px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Поиск информации о сайте</div>
      <div style="display:flex;gap:6px">
        <input value="${domain}" style="flex:1;padding:9px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#f0f6fc;font-size:13px;outline:none;font-family:'Outfit',sans-serif" onkeydown="if(event.key==='Enter')brSearch(this.value)">
        <button onclick="brSearch(document.querySelector('#br-page input').value)" style="padding:9px 16px;background:#238636;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;font-family:'Outfit',sans-serif">Найти</button>
      </div>
    </div>
  </div>`;
  brProgress(100); brSetStatus('Готово · '+domain);
}

function brAddBookmarkUrl(url, name) {
  const bks=JSON.parse(localStorage.getItem('makuos_bookmarks')||'null')||BROWSER_BOOKMARKS_DEFAULT;
  if(bks.find(b=>b.url===url)){showNotif('Закладки','Сайт уже закреплён');return;}
  const finalName = prompt('Название для закладки:', name||url)||name||url;
  const icons = {'yandex':'🔍','google':'🌍','youtube':'▶️','vk':'💬','telegram':'✈️','github':'🐙','habr':'💻','wikipedia':'📖'};
  let icon='🌐'; try{const h=new URL(url).hostname;for(const[k,v]of Object.entries(icons)){if(h.includes(k)){icon=v;break;}}}catch(e){}
  bks.push({name:finalName,icon,url,desc:new URL(url).hostname});
  localStorage.setItem('makuos_bookmarks',JSON.stringify(bks));
  showNotif('Закладки','Закреплено: '+finalName);
}

function brShowBookmarks() {
  const bks=JSON.parse(localStorage.getItem('makuos_bookmarks')||'null')||BROWSER_BOOKMARKS_DEFAULT;
  const ev={clientX:200,clientY:60};
  showCtxMenu(ev, [...bks.map(b=>({label:b.icon+' '+b.name,fn:()=>brNav(b.url)})),{sep:true},{label:'🏠 Домой',fn:()=>brNav('home')}]);
}

function brRemoveBookmark(url) {
  let bks=JSON.parse(localStorage.getItem('makuos_bookmarks')||'null')||BROWSER_BOOKMARKS_DEFAULT;
  bks=bks.filter(b=>b.url!==url);
  localStorage.setItem('makuos_bookmarks',JSON.stringify(bks));
  showNotif('Закладки','Закладка удалена');
  brRenderHome();
}
function brAddBookmark() {
  if(!brCurrentUrl||brCurrentUrl==='home'||brCurrentUrl.startsWith('search:')){showNotif('Закладки','Нельзя добавить эту страницу');return;}
  const name=prompt('Название:',brCurrentUrl);
  if(!name)return;
  const bks=JSON.parse(localStorage.getItem('makuos_bookmarks')||'null')||BROWSER_BOOKMARKS_DEFAULT;
  bks.push({name,icon:'🔖',url:brCurrentUrl,desc:''});
  localStorage.setItem('makuos_bookmarks',JSON.stringify(bks));
  showNotif('Закладки','Добавлено: '+name);
}

// ---- IMAGE VIEWER ----
function openImageViewer(node) {
  createWindow('imgview','Просмотр: '+node.name,'🖼️',700,500,`
    <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);padding:10px">
      <img src="${node.content}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:8px">
    </div>
    <div style="border-top:1px solid var(--border);padding:8px 16px;font-size:12px;color:var(--text2)">${node.name} — ${fsSizeStr(node.size)}</div>
  `);
}

// ===================== SHUTDOWN =====================
function showShutdownMenu() {
  closeStart();
  showDialog('⏻','Завершение работы','Выберите действие:',
    [{label:'🔄 Перезагрузить',primary:false},{label:'🔒 Выйти из системы',primary:false},{label:'⏻ Выключить',primary:true},{label:'Отмена',primary:false}]
  ).then(idx=>{
    if(idx===0){playSound('shutdown');setTimeout(()=>{document.getElementById('startup-screen').style.display='flex';document.getElementById('startup-screen').classList.remove('fade');setTimeout(()=>bootUp(),3000);},1000);}
    else if(idx===1){playSound('logout');showNotif('Выход','Выполняется выход из системы...');}
    else if(idx===2){playSound('shutdown');setTimeout(()=>{document.body.style.background='#000';document.body.innerHTML='<div style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-family:Outfit,sans-serif;font-size:14px">WebOS 0.5 выключен. Обновите страницу для перезагрузки.</div>';},1500);}
  });
}

// ===================== BOOT =====================
function bootUp() {
  playSound('startup');
  setTimeout(()=>{
    const ss=document.getElementById('startup-screen');
    ss.classList.add('fade');
    setTimeout(()=>{ ss.style.display='none'; showNotif('Добро пожаловать!','WebOS 0.5 готова к работе'); },1000);
  },2000);
}

// ===================== INIT =====================
applySettings();
renderDesktopIcons();
renderPinnedTaskbar();
renderStartMenu();

// Startup
setTimeout(bootUp, 2500);

// Click outside to deselect desktop icons
document.getElementById('desktop').addEventListener('click', e=>{
  if (!e.target.closest('.desktop-icon')) {
    document.querySelectorAll('.desktop-icon').forEach(d=>d.classList.remove('selected'));
  }
});

// Double click desktop icons
document.getElementById('desktop').addEventListener('dblclick', e=>{
  if (!e.target.closest('.desktop-icon')) closeCtxMenu();
});

console.log('%cWebOS 0.5 — Loaded', 'color:#0078d4;font-size:18px;font-weight:bold');
</script>
